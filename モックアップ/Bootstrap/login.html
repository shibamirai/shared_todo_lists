<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <header class="p-3 text-bg-primary">
        <div class="d-flex flex-wrap align-items-center justify-content-center justify-content-lg-start">
            <span class="fs-4 me-3">TODOリスト</span>
        </div>
    </header>

    <main class="container">
        <div class="w-50 card mt-5 mx-auto">
            <div class="card-body px-4">
                <h4 class="card-title text-center mb-4">ログイン</h4>
                
                <p class="form-text text-danger text-center">ユーザー名またはパスワードが違います</p>
                <form action="index.html">
                    <div class="mb-3">
                        <label for="email" class="form-label">ユーザー名（メールアドレス）</label>
                        <input type="email" name="email" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">パスワード</label>
                        <input type="password" name="password" class="form-control">
                    </div>
                    <div class="text-center">
                        <button class="btn btn-primary">ログイン</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
